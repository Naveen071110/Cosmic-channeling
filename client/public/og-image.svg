<svg width="1200" height="627" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0e1a"/>
      <stop offset="50%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0c0e1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="627" fill="url(#bg)"/>
  <rect width="1200" height="627" fill="url(#glow)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.8">
    <circle cx="100" cy="80" r="1.5" filter="url(#starGlow)"/>
    <circle cx="250" cy="150" r="1"/>
    <circle cx="400" cy="60" r="1.2"/>
    <circle cx="550" cy="120" r="1.8" fill="#fbbf24" filter="url(#starGlow)"/>
    <circle cx="700" cy="90" r="1"/>
    <circle cx="850" cy="180" r="1.3"/>
    <circle cx="950" cy="70" r="1.5" filter="url(#starGlow)"/>
    <circle cx="1080" cy="140" r="1"/>
    <circle cx="150" cy="300" r="1"/>
    <circle cx="350" cy="350" r="1.2"/>
    <circle cx="600" cy="280" r="1.5" fill="#a78bfa" filter="url(#starGlow)"/>
    <circle cx="800" cy="400" r="0.8"/>
    <circle cx="1050" cy="320" r="1.2"/>
    <circle cx="200" cy="500" r="1"/>
    <circle cx="500" cy="480" r="1.3"/>
    <circle cx="900" cy="520" r="1"/>
    <circle cx="1120" cy="450" r="0.8"/>
    <circle cx="450" cy="200" r="0.8"/>
    <circle cx="1000" cy="250" r="1.2"/>
    <circle cx="680" cy="450" r="1"/>
  </g>

  <!-- Moon crescent -->
  <g transform="translate(850, 200)">
    <circle cx="0" cy="0" r="50" fill="#e2dff0" opacity="0.9"/>
    <circle cx="-15" cy="-10" r="42" fill="#1a1040"/>
  </g>

  <!-- Title -->
  <text x="600" y="300" font-family="Georgia, serif" font-size="64" fill="white" text-anchor="middle" letter-spacing="4" font-weight="bold">
    Cosmic
  </text>
  <text x="600" y="370" font-family="Georgia, serif" font-size="48" fill="#a78bfa" text-anchor="middle" letter-spacing="8" font-weight="300">
    CHANNELING
  </text>

  <!-- Tagline -->
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="18" fill="#9ca3af" text-anchor="middle" letter-spacing="3">
    EXPLORE THE COSMOS · DISCOVER YOURSELF
  </text>

  <!-- Accent line -->
  <line x1="350" y1="455" x2="850" y2="455" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
</svg>
